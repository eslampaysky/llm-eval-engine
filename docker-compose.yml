services:

  aibreaker-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1

  aibreaker-dashboard:
    build:
      context: ./dashboard/review-dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard/review-dashboard:/app
      - dashboard_node_modules:/app/node_modules
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi; npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - aibreaker-api
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  dashboard_node_modules:
