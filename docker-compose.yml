services:

  ai-breaker-lab-ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # persists downloaded models
    restart: unless-stopped

  ai-breaker-lab-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
    depends_on:
      - ai-breaker-lab-ollama       # wait for ollama to start first
    environment:
      - OLLAMA_URL=http://ai-breaker-lab-ollama:11434   # use service name, not localhost

  ai-breaker-lab-dashboard:
    build:
      context: ./dashboard/review-dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard/review-dashboard:/app
      - dashboard_node_modules:/app/node_modules
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi; npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - ai-breaker-lab-api
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  ollama_data:
  dashboard_node_modules:
