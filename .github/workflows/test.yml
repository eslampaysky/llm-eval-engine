name: Tests

on:
  push:
    branches: [ main ]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            aibreaker/pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e aibreaker[dev]

      - name: Run Python tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/review-dashboard/package-lock.json

      - name: Frontend build
        working-directory: dashboard/review-dashboard
        run: |
          npm ci
          npm run build
